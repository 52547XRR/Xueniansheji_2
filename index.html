<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重庆二手房数据分析平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);
  color:#c9d1d9;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
}
/* 背景粒子 */
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.08;}
.header{z-index:1;text-align:center;margin-bottom:48px;}
.header .badge{
  display:inline-block;padding:6px 18px;border-radius:20px;
  background:rgba(88,166,255,0.12);border:1px solid rgba(88,166,255,0.25);
  color:#58a6ff;font-size:13px;letter-spacing:2px;margin-bottom:20px;
}
.header h1{font-size:clamp(28px,5vw,48px);font-weight:800;color:#e6edf3;letter-spacing:-0.5px;}
.header h1 span{background:linear-gradient(135deg,#58a6ff,#3fb950);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header p{margin-top:12px;font-size:16px;color:#8b949e;max-width:520px;margin-left:auto;margin-right:auto;}

/* 卡片行 */
.cards{z-index:1;display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-bottom:48px;}
.card{
  background:rgba(22,27,34,0.85);border:1px solid rgba(48,54,61,0.6);
  border-radius:14px;padding:28px 24px;width:220px;text-align:center;
  backdrop-filter:blur(10px);transition:transform .25s,border-color .25s;
}
.card:hover{transform:translateY(-4px);border-color:rgba(88,166,255,0.5);}
.card .icon{font-size:32px;margin-bottom:12px;}
.card .title{font-size:16px;font-weight:700;color:#e6edf3;margin-bottom:6px;}
.card .desc{font-size:13px;color:#8b949e;line-height:1.6;}

/* 按钮 */
.btn{
  z-index:1;display:inline-block;padding:14px 40px;border-radius:10px;
  background:linear-gradient(135deg,#1f6feb,#238636);
  color:#fff;font-size:17px;font-weight:700;text-decoration:none;
  letter-spacing:1px;transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 24px rgba(31,111,235,0.3);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 32px rgba(31,111,235,0.45);}

.footer{z-index:1;margin-top:36px;font-size:12px;color:#484f58;}
</style>
</head>
<body>

<canvas class="bg" id="bg"></canvas>

<div class="header">
  <div class="badge">🏠 学 年 设 计</div>
  <h1>重庆<span>二手房数据分析</span>平台</h1>
  <p>基于 Scrapy 爬虫 + FastAPI 后端 + ECharts 可视化，多维度洞察重庆主城九区二手房市场走势</p>
</div>

<div class="cards">
  <div class="card">
    <div class="icon">🕷️</div>
    <div class="title">数据采集</div>
    <div class="desc">Scrapy 分布式爬虫<br>Redis 任务队列<br>代理池反反爬</div>
  </div>
  <div class="card">
    <div class="icon">🧹</div>
    <div class="title">清洗建模</div>
    <div class="desc">Pandas 数据清洗<br>MySQL 星型模型<br>Airflow 调度</div>
  </div>
  <div class="card">
    <div class="icon">📊</div>
    <div class="title">可视化</div>
    <div class="desc">ECharts 多维图表<br>FastAPI 接口服务<br>Docker 容器化</div>
  </div>
</div>

<a class="btn" href="dashboard.html">进入分析仪表盘 →</a>

<div class="footer">Chongqing Second-hand Housing Data Platform · 学年设计作品</div>

<script>
// 背景粒子动画
const c=document.getElementById('bg'),ctx=c.getContext('2d');
let w,h,particles=[];
function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
for(let i=0;i<60;i++)particles.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,r:Math.random()*1.5+0.5});
function draw(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#58a6ff';
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
